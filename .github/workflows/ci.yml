name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  # --------------------------------------------------------------------
  # Lint + format check. Fast, no matrix.
  # --------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  # --------------------------------------------------------------------
  # Static type check. Lenient today; strict on canastra.domain once it
  # exists (configured in pyproject.toml).
  # --------------------------------------------------------------------
  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: mypy
        # Scope narrow today: the flat modules. Add canastra/ once Phase 1
        # lands (the strict overrides in pyproject already wait for it).
        run: mypy deck.py player.py table.py helpers.py

  # --------------------------------------------------------------------
  # Test + coverage. Matrix over the author's supported Pythons.
  # Primary = 3.12. 3.11 is the floor (matches pyproject requires-python).
  # --------------------------------------------------------------------
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # The legacy tests live in dotted filenames (test.deck.py,
      # test.helpers.py) that pytest cannot auto-discover. conftest.py in the
      # repo root bridges them. See that file for the Phase-0 removal note.
      - name: pytest + coverage
        run: pytest

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            .coverage
          if-no-files-found: warn
          retention-days: 14

