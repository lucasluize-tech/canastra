# Pre-commit runs on `git commit`. Keep it FAST — heavy jobs (mypy, full
# test suite) live in CI. Install once per clone with: `pre-commit install`.
#
# Update hook pins: `pre-commit autoupdate`
minimum_pre_commit_version: "3.7.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Lint first so auto-fixes land before the formatter reflows the result.
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
